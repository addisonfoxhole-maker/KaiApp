  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

\"3.5\" y=\"13\" width=\"7.5\" height=\"7.5\" rx=\"2.4\" fill=\"{{ navIslands }}\" opacity=\".5\"><\u002Frect><rect x=\"13\" y=\"13\" width=\"7.5\" height=\"7.5\" rx=\"2.4\" fill=\"{{ navIslands }}\"><\u002Frect><\u002Fsvg>\n          <span style=\"font-size:10.5px; font-weight:700; color:{{ navIslands }};\">Islands<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- ===== EDIT BLOCK SHEET ===== -->\n      <sc-if value=\"{{ editing }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"position:absolute; inset:0; z-index:32;\">\n        <div onclick=\"{{ closeEdit }}\" style=\"position:absolute; inset:0; background:rgba(11,49,58,.45); backdrop-filter:blur(2px);\"><\u002Fdiv>\n        <div style=\"position:absolute; left:0; right:0; bottom:0; background:#FFFCF6; border-radius:32px 32px 0 0; padding:22px 22px 26px; box-shadow:0 -20px 50px -20px rgba(11,49,58,.4);\">\n          <div style=\"width:44px; height:5px; border-radius:3px; background:#E2D6C2; margin:0 auto 18px;\"><\u002Fdiv>\n          <div style=\"display:flex; align-items:center; justify-content:space-between; margin-bottom:14px;\">\n            <div style=\"font-family:'Bricolage Grotesque'; font-weight:700; font-size:19px; color:#16313A;\">{{ editTitleLabel }}<\u002Fdiv>\n            <sc-if value=\"{{ editCanDelete }}\" hint-placeholder-val=\"{{ false }}\">\n              <span onclick=\"{{ deleteEdit }}\" style=\"font-size:12.5px; font-weight:700; color:#D8674F; background:#FBE3E0; padding:7px 12px; border-radius:12px; cursor:pointer;\">Delete<\u002Fspan>\n            <\u002Fsc-if>\n          <\u002Fdiv>\n          <input value=\"{{ editTitle }}\" oninput=\"{{ onEditTitle }}\" placeholder=\"What is this block?\" style=\"width:100%; border:none; outline:none; background:#fff; border-radius:16px; padding:14px 15px; font-family:'Plus Jakarta Sans'; font-size:15.5px; font-weight:600; color:#16313A; box-shadow:inset 0 0 0 1.5px #EBE0CE;\">\n\n          <sc-if value=\"{{ editTimed }}\" hint-placeholder-val=\"{{ true }}\">\n          <div>\n            <div style=\"display:flex; gap:11px; margin-top:13px;\">\n              <div style=\"flex:1; background:#fff; border-radius:16px; padding:11px 13px; box-shadow:inset 0 0 0 1.5px #EBE0CE;\">\n                <div style=\"font-size:10.5px; font-weight:700; letter-spacing:.1em; color:#A8937A;\">START<\u002Fdiv>\n                <div style=\"display:flex; align-items:center; justify-content:space-between; margin-top:7px;\">\n                  <span onclick=\"{{ startMinus }}\" style=\"width:34px; height:34px; border-radius:11px; background:#F1EADD; display:flex; align-items:center; justify-content:center; font-size:22px; font-weight:700; color:#7B6A55; cursor:pointer;\">−<\u002Fspan>\n                  <span style=\"font-family:'Bricolage Grotesque'; font-weight:700; font-size:18px; color:#16313A;\">{{ editStart }}<\u002Fspan>\n                  <span onclick=\"{{ startPlus }}\" style=\"width:34px; height:34px; border-radius:11px; background:#F1EADD; display:flex; align-items:center; justify-content:center; font-size:20px; font-weight:700; color:#7B6A55; cursor:pointer;\">+<\u002Fspan>\n                <\u002Fdiv>\n              <\u002Fdiv>\n              <div style=\"flex:1; background:#fff; border-radius:16px; padding:11px 13px; box-shadow:inset 0 0 0 1.5px #EBE0CE;\">\n                <div style=\"font-size:10.5px; font-weight:700; letter-spacing:.1em; color:#A8937A;\">LENGTH<\u002Fdiv>\n                <div style=\"display:flex; align-items:center; justify-content:space-between; margin-top:7px;\">\n                  <span onclick=\"{{ durMinus }}\" style=\"width:34px; height:34px; border-radius:11px; background:#F1EADD; display:flex; align-items:center; justify-content:center; font-size:22px; font-weight:700; color:#7B6A55; cursor:pointer;\">−<\u002Fspan>\n                  <span style=\"font-family:'Bricolage Grotesque'; font-weight:700; font-size:18px; color:#16313A;\">{{ editDur }}<\u002Fspan>\n                  <span onclick=\"{{ durPlus }}\" style=\"width:34px; height:34px; border-radius:11px; background:#F1EADD; display:flex; align-items:center; justify-content:center; font-size:20px; font-weight:700; color:#7B6A55; cursor:pointer;\">+<\u002Fspan>\n                <\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n            <div onclick=\"{{ toggleLock }}\" style=\"{{ editLockRow }}\">\n              <svg width=\"17\" height=\"17\" viewBox=\"0 0 24 24\" fill=\"none\" style=\"flex:none;\"><rect x=\"5\" y=\"11\" width=\"14\" height=\"9\" rx=\"2\" fill=\"{{ editLockIcon }}\"><\u002Frect><path d=\"M8 11V8a4 4 0 0 1 8 0v3\" stroke=\"{{ editLockIcon }}\" stroke-width=\"2\"><\u002Fpath><\u002Fsvg>\n              <span style=\"{{ editLockTextStyle }}\">{{ editLockText }}<\u002Fspan>\n              <span style=\"{{ editToggleTrack }}\"><span style=\"{{ editToggleKnob }}\"><\u002Fspan><\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <\u002Fsc-if>\n\n          <div style=\"margin-top:14px;\">\n            <div style=\"font-size:10.5px; font-weight:700; letter-spacing:.1em; color:#A8937A; margin-bottom:9px;\">COLOR<\u002Fdiv>\n            <div style=\"display:flex; gap:11px;\">\n              <sc-for list=\"{{ swatches }}\" as=\"sw\" hint-placeholder-count=\"5\">\n                <span onclick=\"{{ sw.pick }}\" style=\"{{ sw.style }}\"><\u002Fspan>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <div style=\"display:flex; gap:10px; margin-top:20px;\">\n            <button onclick=\"{{ closeEdit }}\" style=\"flex:none; border:none; cursor:pointer; font-family:'Plus Jakarta Sans'; font-weight:600; font-size:14px; color:#7B6A55; background:#F1EADD; padding:15px 18px; border-radius:18px;\">Cancel<\u002Fbutton>\n            <button onclick=\"{{ saveEdit }}\" style=\"flex:1; border:none; cursor:pointer; font-family:'Plus Jakarta Sans'; font-weight:700; font-size:15.5px; color:#fff; background:linear-gradient(150deg,#1E8A8C,#0E6E76); padding:15px; border-radius:18px; box-shadow:0 12px 22px -8px rgba(14,110,118,.5);\">Save block<\u002Fbutton>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- ===== CAPTURE SHEET ===== -->\n      <sc-if value=\"{{ captureOpen }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"position:absolute; inset:0; z-index:30;\">\n        <div onclick=\"{{ closeCap }}\" style=\"position:absolute; inset:0; background:rgba(11,49,58,.45); backdrop-filter:blur(2px);\"><\u002Fdiv>\n        <div style=\"position:absolute; left:0; right:0; bottom:0; background:#FFFCF6; border-radius:32px 32px 0 0; padding:22px 22px 26px; box-shadow:0 -20px 50px -20px rgba(11,49,58,.4);\">\n          <div style=\"width:44px; height:5px; border-radius:3px; background:#E2D6C2; margin:0 auto 18px;\"><\u002Fdiv>\n          <div style=\"display:flex; align-items:center; gap:9px; margin-bottom:6px;\">\n            <span style=\"font-size:18px;\">🌺<\u002Fspan>\n            <div style=\"font-family:'Bricolage Grotesque'; font-weight:700; font-size:19px; color:#16313A;\">Dump a thought<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"font-size:13.5px; color:#7B6A55; margin-bottom:14px;\">Type or speak it. Kai sorts it into the right island — try \"buy coconut milk\" or \"idea for the stream intro\".<\u002Fdiv>\n          <textarea value=\"{{ captureText }}\" oninput=\"{{ onCap }}\" placeholder=\"What's on your mind?\" style=\"width:100%; height:96px; resize:none; border:none; outline:none; background:#fff; border-radius:18px; padding:15px; font-family:'Plus Jakarta Sans'; font-size:15px; color:#16313A; box-shadow:inset 0 0 0 1.5px #EBE0CE;\"><\u002Ftextarea>\n          <div style=\"display:flex; gap:10px; margin-top:14px;\">\n            <button onclick=\"{{ closeCap }}\" style=\"flex:none; border:none; cursor:pointer; font-family:'Plus Jakarta Sans'; font-weight:600; font-size:14px; color:#7B6A55; background:#F1EADD; padding:15px 18px; border-radius:18px;\">Cancel<\u002Fbutton>\n            <button onclick=\"{{ send }}\" style=\"flex:1; border:none; cursor:pointer; font-family:'Plus Jakarta Sans'; font-weight:700; font-size:15.5px; color:#fff; background:linear-gradient(150deg,#FF8A66,#F0596B); padding:15px; border-radius:18px; box-shadow:0 12px 22px -8px rgba(240,89,107,.55);\">Sort it for me<\u002Fbutton>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <\u002Fsc-if>\n\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  state = {\n    view: 'now',\n    nowMin: 581,\n    thrownOff: false,\n    behindMin: 0,\n    editing: null,\n    flash: [],\n    blocks: {\n      work: [\n        { id:'w1', startMin:510, durMin:45, title:'Outline Module 3 — Brakes', tag:'MORNING SWELL · DEEP WORK', tagColor:'#B5562F', accent:'#FF8A66', sub:'Auto Upkeep · before your shift', locked:false, optional:false },\n        { id:'w2', startMin:660, durMin:240, title:'Shift at the shop', tag:'PART-TIME · LOCKED', tagColor:'#6B7E80', accent:'#9AA8A6', sub:\"protected — Kai won't schedule here\", locked:true, optional:false },\n        { id:'w3', startMin:960, durMin:30, title:'Grocery run + call the shop', tag:'ERRAND DRIFT · LOW LIFT', tagColor:'#2F7D5B', accent:'#2F7D5B', sub:'batch them on the way home', locked:false, optional:false },\n        { id:'w4', startMin:1170, durMin:0, title:'🌙 Wind-down: read 2 saved links', tag:'', tagColor:'#9DB0AE', accent:'', sub:\"optional · only if there's tide left\", locked:false, optional:true },\n      ],\n      off: [\n        { id:'o1', startMin:540, durMin:90, title:'Outline Module 3 — Brakes', tag:'MORNING SWELL · DEEP WORK', tagColor:'#B5562F', accent:'#FF8A66', sub:'Auto Upkeep · long focus, no rush', locked:false, optional:false },\n        { id:'o2', startMin:660, durMin:60, title:'Edit OrcaTeknic stream intro', tag:'DEEP DIVE · CREATIVE', tagColor:'#3F6FCB', accent:'#5B8DEF', sub:'your creative window', locked:false, optional:false },\n        { id:'o3', startMin:840, durMin:45, title:'Foxhole Academy landing tweaks', tag:'LAUNCH PREP · SMALL WINS', tagColor:'#B5562F', accent:'#F0596B', sub:'small, satisfying wins', locked:false, optional:false },\n        { id:'o4', startMin:1170, durMin:0, title:'🌙 Wind-down: read 2 saved links', tag:'', tagColor:'#9DB0AE', accent:'', sub:\"optional · only if there's tide left\", locked:false, optional:true },\n      ],\n    },\n    dayOverride: null,\n    editMode: false,\n    newStep: '',\n    routines: {\n      work: [\n        { id:'teeth', label:'Brush teeth', done:false },\n        { id:'deo', label:'Deodorant', done:false },\n        { id:'vits', label:'Vitamins + big glass of water', done:false },\n        { id:'sun', label:'Wash face + sunscreen', done:false },\n        { id:'lunch', label:'Pack lunch + leave by 8:30', done:false },\n      ],\n      off: [\n        { id:'teeth', label:'Brush teeth', done:false },\n        { id:'deo', label:'Deodorant', done:false },\n        { id:'vits', label:'Vitamins + big glass of water', done:false },\n        { id:'sun', label:'Wash face + sunscreen', done:false },\n        { id:'move', label:'Move your body — 15 min', done:false },\n      ],\n    },\n    focus: 'idle',\n    secs: 1500,\n    captureOpen: false,\n    captureText: '',\n    landed: [\n      { id:1, text:'Oat flour + coconut milk', proj:'Grocery', color:'#2F7D5B', bg:'#E2F2E6' },\n      { id:2, text:'Cold-open with a failure clip', proj:'OrcaTeknic', color:'#3F6FCB', bg:'#E7EEFB' },\n    ],\n    toast: '',\n  };\n  tick = null;\n\n  detected = (() => { const g = new Date().getDay(); return (g >= 1 && g <= 4) ? 'work' : 'off'; })();\n  day(){ return this.state.dayOverride || this.detected; }\n  componentDidMount(){\n    try { const raw = localStorage.getItem('kai.routines.v1'); if (raw) this.setState({ routines: JSON.parse(raw) }); } catch(e){}\n    try { const raw = localStorage.getItem('kai.blocks.v1'); if (raw) this.setState({ blocks: JSON.parse(raw) }); } catch(e){}\n  }\n  persistBlocks(blocks){ try { localStorage.setItem('kai.blocks.v1', JSON.stringify(blocks)); } catch(e){} }\n  setBlocks(fn){ this.setState(s => { const blocks = fn(s.blocks, this.day()); this.persistBlocks(blocks); return { blocks }; }); }\n  fmtTime(min){ let h = Math.floor(min/60); let m = ((min%60)+60)%60; let hh = h%12; if (hh===0) hh = 12; return hh + ':' + String(m).padStart(2,'0'); }\n  durStr(m){ if (!m) return ''; if (m>=60){ const h = Math.floor(m/60), r = m%60; return r ? h+'h '+r+'m' : h+'h'; } return m+'m'; }\n  sortBlocks(arr){ return [...arr].sort((a,b)=>{ if (a.optional && !b.optional) return 1; if (b.optional && !a.optional) return -1; return a.startMin - b.startMin; }); }\n\n  simulateBehind(){ this.setState(s => ({ nowMin: s.nowMin + 45, behindMin: s.behindMin + 45, thrownOff: true })); }\n\n  reflow(){\n    const d = this.day();\n    this.setState(s => {\n      const list = s.blocks[d];\n      const opt = list.filter(b => b.optional);\n      const fixed = list.filter(b => !b.optional);\n      const locked = fixed.filter(b => b.locked).map(b => ({ s:b.startMin, e:b.startMin + b.durMin }));\n      const flex = fixed.filter(b => !b.locked).sort((a,b) => a.startMin - b.startMin);\n      let cursor = Math.ceil(s.nowMin/5)*5;\n      const changed = [];\n      const placed = flex.map(b => {\n        let start = cursor, guard = 0;\n        while (guard++ < 50){\n          const end = start + b.durMin;\n          const hit = locked.find(L => start < L.e && end > L.s);\n          if (hit) start = hit.e; else break;\n        }\n        if (start !== b.startMin) changed.push(b.id);\n        cursor = start + b.durMin + 10;\n        return { ...b, startMin: start };\n      });\n      const merged = this.sortBlocks([ ...placed, ...fixed.filter(b => b.locked), ...opt ]);\n      const blocks = { ...s.blocks, [d]: merged };\n      this.persistBlocks(blocks);\n      return { blocks, thrownOff:false, behindMin:0, flash: changed, toast: 'Re-flowed ' + placed.length + ' blocks around your locked time 🌊' };\n    });\n    clearTimeout(this.flashT); this.flashT = setTimeout(() => this.setState({ flash:[] }), 1100);\n    clearTimeout(this.toastT); this.toastT = setTimeout(() => this.setState({ toast:'' }), 3000);\n  }\n\n  openEdit(b){ this.setState({ editing: { ...b, isNew:false } }); }\n  addBlock(){ this.setState(s => ({ editing: { id:'c'+Date.now(), startMin: Math.ceil(s.nowMin/5)*5, durMin:30, title:'', tag:'NEW BLOCK', tagColor:'#B5562F', accent:'#FF8A66', sub:'a fresh wave', locked:false, optional:false, isNew:true } })); }\n  closeEdit(){ this.setState({ editing:null }); }\n  eTitle(e){ const v = e.target.value; this.setState(s => ({ editing: { ...s.editing, title:v } })); }\n  eBumpStart(delta){ this.setState(s => ({ editing: { ...s.editing, startMin: Math.max(0, Math.min(1425, s.editing.startMin + delta)) } })); }\n  eBumpDur(delta){ this.setState(s => ({ editing: { ...s.editing, durMin: Math.max(5, s.editing.durMin + delta) } })); }\n  eAccent(c){ this.setState(s => ({ editing: { ...s.editing, accent:c } })); }\n  eToggleLock(){ this.setState(s => ({ editing: { ...s.editing, locked: !s.editing.locked } })); }\n  saveEdit(){\n    const e = this.state.editing; if (!e) return;\n    const clean = { id:e.id, startMin:e.startMin, durMin:e.durMin, title:(e.title||'').trim() || 'Untitled block', tag:e.tag || (e.locked ? 'LOCKED' : 'BLOCK'), tagColor:e.tagColor, accent:e.accent, sub:e.sub, locked:e.locked, optional:e.optional };\n    this.setBlocks((blocks, day) => {\n      const arr = [...blocks[day]];\n      const i = arr.findIndex(x => x.id === e.id);\n      if (i >= 0) arr[i] = clean; else arr.push(clean);\n      return { ...blocks, [day]: this.sortBlocks(arr) };\n    });\n    this.setState({ editing:null });\n  }\n  deleteEdit(){ const e = this.state.editing; if (!e) return; this.setBlocks((blocks, day) => ({ ...blocks, [day]: blocks[day].filter(x => x.id !== e.id) })); this.setState({ editing:null }); }\n  persist(routines){ try { localStorage.setItem('kai.routines.v1', JSON.stringify(routines)); } catch(e){} }\n  setRoutines(fn){ this.setState(s => { const routines = fn(s.routines, this.day()); this.persist(routines); return { routines }; }); }\n  toggleRoutine(id){ this.setRoutines((r,d) => ({ ...r, [d]: r[d].map(x => x.id===id ? {...x, done:!x.done} : x) })); }\n  setDay(d){ this.setState({ dayOverride:d }); }\n  resetAuto(){ this.setState({ dayOverride:null }); }\n  toggleEdit(){ this.setState(s => ({ editMode: !s.editMode })); }\n  onNewStep(e){ this.setState({ newStep: e.target.value }); }\n  onStepKey(e){ if (e.key === 'Enter') this.addStep(); }\n  addStep(){ const t = this.state.newStep.trim(); if (!t) return; this.setRoutines((r,d) => ({ ...r, [d]: [...r[d], { id:'c'+Date.now(), label:t, done:false }] })); this.setState({ newStep:'' }); }\n  removeStep(id){ this.setRoutines((r,d) => ({ ...r, [d]: r[d].filter(x => x.id !== id) })); }\n  moveStep(id, dir){ this.setRoutines((r,d) => { const arr = [...r[d]]; const i = arr.findIndex(x => x.id===id); const j = i + dir; if (i < 0 || j < 0 || j >= arr.length) return r; [arr[i], arr[j]] = [arr[j], arr[i]]; return { ...r, [d]: arr }; }); }\n  go(v){ this.setState({ view:v }); }\n  start(){\n    clearInterval(this.tick);\n    this.setState({ focus:'running', secs:1500 });\n    this.tick = setInterval(() => {\n      this.setState(s => {\n        if (s.secs <= 1){ clearInterval(this.tick); return { secs:0, focus:'done' }; }\n        return { secs: s.secs - 1 };\n      });\n    }, 1000);\n  }\n  pause(){ clearInterval(this.tick); this.setState({ focus:'idle' }); }\n  finish(){ clearInterval(this.tick); this.setState({ focus:'done' }); }\n  nextWave(){ clearInterval(this.tick); this.setState({ focus:'idle', secs:1500 }); }\n  componentWillUnmount(){ clearInterval(this.tick); }\n\n  openCap(){ this.setState({ captureOpen:true }); }\n  closeCap(){ this.setState({ captureOpen:false, captureText:'' }); }\n  onCap(e){ this.setState({ captureText: e.target.value }); }\n  guess(t){\n    const x = t.toLowerCase();\n    if (/milk|flour|grocer|buy|store|eggs|coconut|pick up|deodorant|shampoo/.test(x)) return { proj:'Grocery', color:'#2F7D5B', bg:'#E2F2E6' };\n    if (/stream|clip|orca|edit|video|intro|overlay|twitch/.test(x)) return { proj:'OrcaTeknic', color:'#3F6FCB', bg:'#E7EEFB' };\n    if (/module|brake|curric|lesson|engine|oil|tire/.test(x)) return { proj:'Auto Upkeep', color:'#B5562F', bg:'#FFEAD9' };\n    if (/academy|foxhole|launch|landing|enroll|student/.test(x)) return { proj:'Foxhole Academy', color:'#B5562F', bg:'#FFEAD9' };\n    return { proj:'Inbox', color:'#7B6A55', bg:'#F1EADD' };\n  }\n  send(){\n    const t = this.state.captureText.trim();\n    if (!t) return;\n    const g = this.guess(t);\n    this.setState(s => ({\n      landed: [{ id:Date.now(), text:t, proj:g.proj, color:g.color, bg:g.bg }, ...s.landed],\n      captureText:'', captureOpen:false, toast:'Landed in ' + g.proj,\n    }));\n    clearTimeout(this.toastT);\n    this.toastT = setTimeout(() => this.setState({ toast:'' }), 2600);\n  }\n\n  renderVals(){\n    const s = this.state;\n    const d = this.day();\n    const cur = s.routines[d];\n    const done = cur.filter(r => r.done).length;\n    const routine = cur.map(r => ({\n      ...r,\n      toggle: () => this.toggleRoutine(r.id),\n      remove: () => this.removeStep(r.id),\n      up: () => this.moveStep(r.id, -1),\n      down: () => this.moveStep(r.id, 1),\n      boxStyle: r.done\n        ? 'width:24px;height:24px;border-radius:9px;background:#36B3A8;display:flex;align-items:center;justify-content:center;flex:none;'\n        : 'width:24px;height:24px;border-radius:9px;background:#fff;box-shadow:inset 0 0 0 2px #E2D6C2;display:flex;align-items:center;justify-content:center;flex:none;',\n      labelStyle: r.done\n        ? 'font-size:15px;font-we   showPencil: !b.locked,\n        showNowBefore,\n        edit: () => this.openEdit(b),\n      };\n    });\n    const flexAhead = dblocks.filter(b => !b.optional && !b.locked && (b.startMin + b.durMin) > s.nowMin).length;\n    const behindLabel = \"You're \" + this.durStr(s.behindMin) + ' behind';\n\n    // ===== EDIT SHEET =====\n    const e = s.editing;\n    const eLocked = e ? e.locked : false;\n    const swatches = ['#FF8A66','#5B8DEF','#2F7D5B','#F0596B','#E0A435'].map(c => ({\n      pick: () => this.eAccent(c),\n      style: 'width:32px;height:32px;border-radius:50%;cursor:pointer;background:' + c + ';box-shadow:' + ((e && e.accent === c) ? '0 0 0 3px #16313A' : 'inset 0 0 0 1px rgba(0,0,0,.12)') + ';',\n    }));\n    return {\n      isNow: s.view==='now', isToday: s.view==='today', isIslands: s.view==='islands',\n      routine, routineLabel: done + ' of ' + cur.length,\n      allDone: done===cur.length, anyLeft: done < cur.length,\n      isWork, isOff: !isWork,\n      setWork: () => this.setDay('work'), setOff: () => this.setDay('off'),\n      segWork: isWork ? segActiveS : segIdleS, segOff: isWork ? segIdleS : segActiveS,\n      dayChip: isWork ? '☀ work by 11' : '🌴 day off',\n      whyText: isWork ? 'your calm window before the shift, and it nudges the launch forward.' : 'a wide-open morning — best for deep work before you rest.',\n      todaySub: isWork ? 'Shift 11–3 · 2 focus blocks around it' : 'Wide open · 3 gentle blocks',\n      blocks,\n      thrownOff: s.thrownOff, onTrack: !s.thrownOff,\n      behindLabel, flexCount: flexAhead, nowLabel: 'now · ' + this.fmtTime(s.nowMin),\n      reflow: () => this.reflow(), simulateBehind: () => this.simulateBehind(),\n      addBlock: () => this.addBlock(),\n      editing: !!e,\n      editTitleLabel: (e && e.isNew) ? 'New block' : 'Edit block',\n      editCanDelete: e ? !e.isNew : false,\n      editTimed: e ? !e.optional : true,\n      editTitle: e ? e.title : '',\n      editStart: e ? this.fmtTime(e.startMin) : '',\n      editDur: e ? this.durStr(e.durMin) : '',\n      editLockIcon: eLocked ? '#36B3A8' : '#A8937A',\n      editLockRow: 'display:flex; align-items:center; gap:11px; margin-top:11px; padding:12px 14px; border-radius:16px; cursor:pointer; background:' + (eLocked ? '#16313A' : '#F6F1E7') + ';',\n      editLockTextStyle: 'flex:1; font-size:12.5px; font-weight:600; line-height:1.35; color:' + (eLocked ? '#EAFBF8' : '#4A3D2C') + ';',\n      editLockText: eLocked ? 'Protected · Kai keeps this time fixed' : \"Protect this time — Kai won't move it\",\n      editToggleTrack: 'width:40px; height:24px; border-radius:14px; flex:none; position:relative; background:' + (eLocked ? '#36B3A8' : '#D9CDB8') + ';',\n      editToggleKnob: 'position:absolute; top:3px; ' + (eLocked ? 'left:19px' : 'left:3px') + '; width:18px; height:18px; border-radius:50%; background:#fff;',\n      swatches,\n      onEditTitle: ev => this.eTitle(ev),\n      startMinus: () => this.eBumpStart(-15), startPlus: () => this.eBumpStart(15),\n      durMinus: () => this.eBumpDur(-15), durPlus: () => this.eBumpDur(15),\n      toggleLock: () => this.eToggleLock(), saveEdit: () => this.saveEdit(),\n      closeEdit: () => this.closeEdit(), deleteEdit: () => this.deleteEdit(),\n      editMode: s.editMode, toggleEdit: () => this.toggleEdit(),\n      editLabel: s.editMode ? 'Done' : 'Edit',\n      editBtnStyle: s.editMode ? 'font-size:12px;font-weight:700;color:#F0596B;cursor:pointer;' : 'font-size:12px;font-weight:700;color:#1E8A8C;cursor:pointer;',\n      newStep: s.newStep, onNewStep: e => this.onNewStep(e), onStepKey: e => this.onStepKey(e), addStep: () => this.addStep(),\n      dateStr, resetAuto: () => this.resetAuto(), autoTag, autoTagStyle,\n      goNow: () => this.go('now'), goToday: () => this.go('today'), goIslands: () => this.go('islands'),\n      focusIdle: s.focus==='idle', focusRunning: s.focus==='running', focusDone: s.focus==='done',\n      timer: mm + ':' + ss,\n      start: () => this.start(), pause: () => this.pause(), finish: () => this.finish(), nextWave: () => this.nextWave(),\n      openCap: () => this.openCap(), closeCap: () => this.closeCap(), onCap: e => this.onCap(e), send: () => this.send(),\n      captureOpen: s.captureOpen, captureText: s.captureText, landed: s.landed,\n      toast: s.toast, hasToast: !!s.toast,\n      navNow: nav('now'), navToday: nav('today'), navIslands: nav('islands'),\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
