<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>OrcaTeknic — Transmission Ended</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@200;300;400;500&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --abyss: #020509;
    --deep: #050e16;
    --bio: #4dd4c0;
    --text: #e8eef2;
    --dim: #5a6a75;
    --faint: #2a3740;
  }
  html, body {
    width: 100vw; height: 100vh; overflow: hidden;
    background: var(--abyss); color: var(--text);
    font-family: 'IBM Plex Mono', monospace;
    font-weight: 300;
    user-select: none;
  }
  body {
    background: radial-gradient(ellipse at center, var(--deep) 0%, var(--abyss) 80%);
    position: relative;
  }

  body::before {
    content: ''; position: fixed; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 400 400' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    opacity: 0.06; pointer-events: none; z-index: 100; mix-blend-mode: overlay;
  }

  .frame { position: fixed; inset: 2rem; border: 1px solid var(--faint); pointer-events: none; }

  .telemetry-top, .telemetry-bottom {
    position: fixed; left: 3.5rem; right: 3.5rem;
    display: flex; justify-content: space-between; align-items: center;
    font-size: 0.78rem; letter-spacing: 0.25em;
    color: var(--dim); text-transform: uppercase;
    z-index: 10;
  }
  .telemetry-top { top: 3rem; }
  .telemetry-bottom { bottom: 3rem; }

  .stage {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
    justify-content: center; align-items: center;
    gap: 2.5rem;
    padding: 0 3rem;
  }

  .label {
    font-size: 0.9rem;
    letter-spacing: 0.6em;
    color: var(--bio);
    text-transform: uppercase;
    padding-left: 0.6em;
  }

  .headline {
    font-size: clamp(2.5rem, 6vw, 7rem);
    font-weight: 200;
    letter-spacing: -0.02em;
    color: var(--text);
    line-height: 0.95;
    text-align: center;
  }

  .sub {
    font-size: 1rem;
    letter-spacing: 0.35em;
    color: var(--dim);
    text-transform: uppercase;
    text-align: center;
    max-width: 50ch;
    line-height: 1.7;
    padding-left: 0.35em;
  }

  .socials {
    display: flex;
    gap: 4rem;
    margin-top: 2rem;
    flex-wrap: wrap;
    justify-content: center;
  }

  .social {
    text-align: center;
    min-width: 140px;
  }
  .social .plat {
    font-size: 0.7rem;
    letter-spacing: 0.4em;
    color: var(--dim);
    text-transform: uppercase;
    margin-bottom: 0.4rem;
  }
  .social .handle {
    font-size: 1.1rem;
    color: var(--text);
    letter-spacing: 0.1em;
    font-weight: 400;
  }
  .social .handle::before {
    content: '@ ';
    color: var(--bio);
  }

  .divider {
    width: 60px; height: 1px;
    background: var(--faint);
    position: relative;
  }
  .divider::before {
    content: ''; position: absolute;
    top: -3px; left: 50%; transform: translateX(-50%);
    width: 7px; height: 7px;
    background: var(--bio);
    border-radius: 50%;
    box-shadow: 0 0 8px var(--bio);
  }

  .wordmark { font-weight: 500; color: var(--text); letter-spacing: 0.35em; }
  .wordmark .mark { color: var(--bio); font-weight: 300; margin: 0 0.1em; }

  @media (max-aspect-ratio: 1/1) {
    .headline { font-size: clamp(2rem, 8vw, 5rem); }
    .socials { gap: 2rem; }
    .social { min-width: 100%; }
  }
</style>
</head>
<body>

  <div class="frame"></div>

  <div class="telemetry-top">
    <div>SIGNAL / TERMINATED</div>
    <div id="ts">—</div>
    <div>CH 01 / CLOSED</div>
  </div>

  <div class="stage">
    <div class="label">End of Transmission</div>
    <h1 class="headline">Thanks for Listening</h1>
    <div class="divider"></div>
    <p class="sub">
      The hydrophone goes quiet · But the pod travels on<br>
      Follow along wherever you surface
    </p>

    <div class="socials">
      <div class="social">
        <div class="plat">YouTube</div>
        <div class="handle">orcateknic</div>
      </div>
      <div class="social">
        <div class="plat">TikTok</div>
        <div class="handle">orcateknic</div>
      </div>
      <div class="social">
        <div class="plat">Instagram</div>
        <div class="handle">orcateknic</div>
      </div>
    </div>
  </div>

  <div class="telemetry-bottom">
    <div class="wordmark">Orca<span class="mark">/</span>Teknic</div>
    <div>TRANSMISSION COMPLETE</div>
  </div>

<script>
  function tick() {
    const n = new Date();
    const p = x => String(x).padStart(2, '0');
    document.getElementById('ts').textContent =
      `${p(n.getUTCHours())}:${p(n.getUTCMinutes())}:${p(n.getUTCSeconds())} UTC`;
  }
  tick();
  setInterval(tick, 1000);
</script>

</body>
</html>
