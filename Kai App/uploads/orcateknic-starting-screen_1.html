<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>OrcaTeknic — Transmission Begins</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@200;300;400;500;600&display=swap" rel="stylesheet">

<!-- ================================================================= -->
<!-- CUSTOMIZE YOUR COUNTDOWN HERE — change the number on this line:    -->
<!-- ================================================================= -->
<script>const COUNTDOWN_MINUTES = 5;</script>

<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --abyss: #020509;
    --deep: #050e16;
    --bio: #4dd4c0;
    --warn: #ffb347;
    --text: #e8eef2;
    --dim: #5a6a75;
    --faint: #2a3740;
  }

  html, body {
    width: 100vw;
    height: 100vh;
    overflow: hidden;
    background: var(--abyss);
    color: var(--text);
    font-family: 'IBM Plex Mono', monospace;
    font-weight: 300;
    user-select: none;
  }

  body {
    background:
      radial-gradient(ellipse 80% 60% at 50% 50%, var(--deep) 0%, var(--abyss) 75%),
      var(--abyss);
    position: relative;
  }

  /* Grain texture */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 400 400' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='3'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");
    opacity: 0.06;
    pointer-events: none;
    z-index: 100;
    mix-blend-mode: overlay;
  }

  /* Subtle horizontal scan texture */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent 0px,
      transparent 3px,
      rgba(77,212,192,0.015) 4px
    );
    pointer-events: none;
    z-index: 99;
  }

  /* Frame border */
  .frame {
    position: fixed;
    inset: 2rem;
    border: 1px solid var(--faint);
    pointer-events: none;
    z-index: 5;
  }

  .frame::before, .frame::after {
    content: '';
    position: absolute;
    background: var(--bio);
  }
  .frame::before {
    top: -1px; left: -1px;
    width: 40px; height: 1px;
  }
  .frame::after {
    bottom: -1px; right: -1px;
    width: 40px; height: 1px;
  }

  /* Top telemetry */
  .telemetry-top {
    position: fixed;
    top: 3rem;
    left: 3.5rem;
    right: 3.5rem;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 0.8rem;
    letter-spacing: 0.2em;
    color: var(--dim);
    text-transform: uppercase;
    z-index: 10;
  }

  .telemetry-top .active-dot {
    display: inline-block;
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--bio);
    margin-right: 0.8rem;
    box-shadow: 0 0 8px var(--bio);
    animation: pulse 2s ease-in-out infinite;
    vertical-align: middle;
  }

  /* Vertical side labels */
  .side-label {
    position: fixed;
    top: 50%;
    font-size: 0.72rem;
    letter-spacing: 0.5em;
    color: var(--dim);
    text-transform: uppercase;
    writing-mode: vertical-rl;
    z-index: 10;
  }
  .side-label.left {
    left: 3rem;
    transform: translateY(-50%) rotate(180deg);
  }
  .side-label.right {
    right: 3rem;
    transform: translateY(-50%);
  }

  /* Main stage */
  .stage {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    z-index: 20;
  }

  .label {
    font-size: 0.95rem;
    letter-spacing: 0.6em;
    color: var(--dim);
    margin-bottom: 4rem;
    text-transform: uppercase;
    font-weight: 400;
    padding-left: 0.6em;
  }

  .countdown {
    font-size: clamp(8rem, 18vw, 22rem);
    font-weight: 200;
    letter-spacing: -0.05em;
    line-height: 0.85;
    color: var(--text);
    font-variant-numeric: tabular-nums;
    display: flex;
    align-items: center;
    gap: 0.1em;
  }

  .colon {
    color: var(--bio);
    animation: blink 1.1s steps(2) infinite;
    transform: translateY(-0.08em);
  }

  .subtitle {
    font-size: 1rem;
    letter-spacing: 0.5em;
    color: var(--dim);
    margin-top: 4rem;
    text-transform: uppercase;
    padding-left: 0.5em;
  }

  /* Waveform strip */
  .waveform {
    position: fixed;
    bottom: 8rem;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 3px;
    align-items: center;
    height: 32px;
    z-index: 15;
  }
  .waveform span {
    display: block;
    width: 2px;
    background: var(--bio);
    opacity: 0.6;
    animation: wave 1.4s ease-in-out infinite;
  }
  .waveform span:nth-child(1) { animation-delay: 0.0s; height: 30%; }
  .waveform span:nth-child(2) { animation-delay: 0.1s; height: 60%; }
  .waveform span:nth-child(3) { animation-delay: 0.2s; height: 40%; }
  .waveform span:nth-child(4) { animation-delay: 0.3s; height: 80%; }
  .waveform span:nth-child(5) { animation-delay: 0.4s; height: 100%; }
  .waveform span:nth-child(6) { animation-delay: 0.5s; height: 70%; }
  .waveform span:nth-child(7) { animation-delay: 0.6s; height: 50%; }
  .waveform span:nth-child(8) { animation-delay: 0.5s; height: 90%; }
  .waveform span:nth-child(9) { animation-delay: 0.4s; height: 60%; }
  .waveform span:nth-child(10) { animation-delay: 0.3s; height: 40%; }
  .waveform span:nth-child(11) { animation-delay: 0.2s; height: 75%; }
  .waveform span:nth-child(12) { animation-delay: 0.1s; height: 50%; }
  .waveform span:nth-child(13) { animation-delay: 0.0s; height: 35%; }

  /* Bottom telemetry */
  .telemetry-bottom {
    position: fixed;
    bottom: 3rem;
    left: 3.5rem;
    right: 3.5rem;
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    font-size: 0.78rem;
    letter-spacing: 0.25em;
    color: var(--dim);
    z-index: 10;
  }

  .wordmark {
    font-weight: 500;
    font-size: 0.95rem;
    letter-spacing: 0.35em;
    color: var(--text);
    text-transform: uppercase;
  }
  .wordmark .mark {
    color: var(--bio);
    font-weight: 300;
    margin: 0 0.1em;
  }

  /* Urgent state */
  .countdown.urgent { color: var(--warn); }
  .countdown.urgent .colon { color: var(--warn); }

  /* Animations */
  @keyframes pulse {
    0%, 100% { opacity: 1; box-shadow: 0 0 8px var(--bio); }
    50% { opacity: 0.4; box-shadow: 0 0 2px var(--bio); }
  }
  @keyframes blink {
    50% { opacity: 0.15; }
  }
  @keyframes wave {
    0%, 100% { transform: scaleY(0.4); }
    50% { transform: scaleY(1); }
  }
</style>
</head>
<body>

  <div class="frame"></div>

  <div class="telemetry-top">
    <div>
      <span class="active-dot"></span>HYDROPHONE / ACTIVE
    </div>
    <div id="timestamp">—</div>
    <div>SIGNAL&nbsp;&nbsp;01/01</div>
  </div>

  <div class="side-label left">
    19.8968°N · 155.5828°W · NORTH PACIFIC
  </div>

  <div class="side-label right">
    FREQ 12.5 KHZ · GAIN 0 DB · CH 01
  </div>

  <div class="stage">
    <div class="label" id="label">Transmission Begins In</div>
    <div class="countdown" id="countdown">
      <span id="mm">05</span><span class="colon">:</span><span id="ss">00</span>
    </div>
    <div class="subtitle" id="subtitle">Stand By</div>
  </div>

  <div class="waveform" aria-hidden="true">
    <span></span><span></span><span></span><span></span><span></span>
    <span></span><span></span><span></span><span></span><span></span>
    <span></span><span></span><span></span>
  </div>

  <div class="telemetry-bottom">
    <div class="wordmark">Orca<span class="mark">/</span>Teknic</div>
    <div id="session-id">SESSION —</div>
    <div>BROADCAST&nbsp;&nbsp;READY</div>
  </div>

<script>
  // Allow URL override: ?minutes=10
  const params = new URLSearchParams(window.location.search);
  const minutes = parseInt(params.get('minutes')) || COUNTDOWN_MINUTES;
  let secondsLeft = minutes * 60;

  const mmEl = document.getElementById('mm');
  const ssEl = document.getElementById('ss');
  const countdownEl = document.getElementById('countdown');
  const labelEl = document.getElementById('label');
  const subtitleEl = document.getElementById('subtitle');

  function tick() {
    if (secondsLeft <= 0) {
      mmEl.textContent = '00';
      ssEl.textContent = '00';
      labelEl.textContent = 'Transmission Live';
      subtitleEl.textContent = 'Now Broadcasting';
      return;
    }
    const mm = Math.floor(secondsLeft / 60);
    const ss = secondsLeft % 60;
    mmEl.textContent = String(mm).padStart(2, '0');
    ssEl.textContent = String(ss).padStart(2, '0');
    if (secondsLeft <= 30) countdownEl.classList.add('urgent');
    secondsLeft--;
  }

  tick();
  setInterval(tick, 1000);

  // Live UTC clock
  function updateTimestamp() {
    const now = new Date();
    const pad = n => String(n).padStart(2, '0');
    document.getElementById('timestamp').textContent =
      `${pad(now.getUTCHours())}:${pad(now.getUTCMinutes())}:${pad(now.getUTCSeconds())} UTC`;
  }
  updateTimestamp();
  setInterval(updateTimestamp, 1000);

  // Random session ID so it feels fresh each stream
  const sid = Math.random().toString(16).substring(2, 8).toUpperCase();
  document.getElementById('session-id').textContent = `SESSION — ${sid}`;
</script>

</body>
</html>
