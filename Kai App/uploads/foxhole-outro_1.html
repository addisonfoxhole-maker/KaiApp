<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Addison Foxhole — End of Manual</title>
<link href="https://fonts.googleapis.com/css2?family=Special+Elite&family=Oswald:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --paper: #e8dcc0;
    --paper-dark: #d4c294;
    --ink: #2a1f15;
    --ink-fade: #4a3a28;
    --olive: #4a5d3a;
    --rust: #8b3a2a;
    --brass: #b8904a;
  }
  html, body {
    width: 100vw; height: 100vh; overflow: hidden;
    background: var(--paper); color: var(--ink);
    font-family: 'Special Elite', monospace;
    user-select: none;
  }
  body {
    background:
      radial-gradient(ellipse at 50% 50%, rgba(255,240,200,0.3) 0%, transparent 70%),
      var(--paper);
    position: relative;
  }

  body::before {
    content: ''; position: fixed; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 400 400' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    opacity: 0.12; pointer-events: none; z-index: 100; mix-blend-mode: multiply;
  }

  body::after {
    content: ''; position: fixed; inset: 0;
    background-image:
      linear-gradient(rgba(42,31,21,0.06) 1px, transparent 1px),
      linear-gradient(90deg, rgba(42,31,21,0.06) 1px, transparent 1px);
    background-size: 48px 48px;
    pointer-events: none; z-index: 1;
  }

  .border-outer { position: fixed; inset: 2rem; border: 3px solid var(--ink); z-index: 2; }
  .border-inner { position: fixed; inset: 2.6rem; border: 1px solid var(--ink); z-index: 2; }

  .manual-header {
    position: fixed;
    top: 3.2rem; left: 3.2rem; right: 3.2rem;
    display: flex; justify-content: space-between; align-items: center;
    padding-bottom: 1rem;
    border-bottom: 1px solid var(--ink);
    font-family: 'Oswald', sans-serif;
    font-weight: 600;
    font-size: 0.9rem;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    z-index: 5;
  }
  .dot-sep {
    display: inline-block;
    width: 5px; height: 5px;
    background: var(--rust);
    border-radius: 50%;
    margin: 0 0.6rem;
    vertical-align: middle;
  }

  .stage {
    position: absolute; inset: 0;
    padding: 8rem 5rem;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
    gap: 2rem;
    z-index: 3;
  }

  .eyebrow {
    font-family: 'Oswald', sans-serif;
    font-weight: 500;
    font-size: 1rem;
    letter-spacing: 0.5em;
    color: var(--rust);
    text-transform: uppercase;
  }

  .headline {
    font-family: 'Oswald', sans-serif;
    font-weight: 700;
    font-size: clamp(3rem, 7vw, 8rem);
    letter-spacing: -0.01em;
    line-height: 0.95;
    text-transform: uppercase;
    color: var(--ink);
    max-width: 20ch;
  }

  .rule {
    width: 180px; height: 3px;
    background: var(--ink);
    position: relative;
    margin: 1rem 0;
  }
  .rule::before, .rule::after {
    content: ''; position: absolute;
    top: -4px;
    width: 11px; height: 11px;
    background: var(--rust);
    border-radius: 50%;
  }
  .rule::before { left: -6px; }
  .rule::after { right: -6px; }

  .body-copy {
    font-family: 'Special Elite', monospace;
    font-size: clamp(1rem, 1.5vw, 1.4rem);
    color: var(--ink-fade);
    max-width: 50ch;
    line-height: 1.6;
  }

  /* CTA cards */
  .cta-row {
    display: flex; gap: 2rem;
    margin-top: 2rem;
    flex-wrap: wrap;
    justify-content: center;
  }
  .cta {
    background: var(--paper-dark);
    border: 2px solid var(--ink);
    padding: 1.2rem 1.8rem;
    min-width: 240px;
    text-align: left;
    box-shadow: 4px 4px 0 var(--ink);
    position: relative;
  }
  .cta .action {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.7rem;
    letter-spacing: 0.3em;
    color: var(--rust);
    text-transform: uppercase;
    margin-bottom: 0.3rem;
  }
  .cta .target {
    font-family: 'Oswald', sans-serif;
    font-weight: 600;
    font-size: 1.2rem;
    letter-spacing: 0.05em;
    color: var(--ink);
    text-transform: uppercase;
  }

  .footer {
    position: fixed;
    bottom: 3.2rem; left: 3.2rem; right: 3.2rem;
    padding-top: 1rem;
    border-top: 1px solid var(--ink);
    display: flex; justify-content: space-between; align-items: center;
    font-family: 'Oswald', sans-serif;
    font-size: 0.85rem;
    letter-spacing: 0.25em;
    color: var(--ink);
    text-transform: uppercase;
    z-index: 5;
  }
  .brand {
    font-weight: 700;
    letter-spacing: 0.3em;
    font-size: 1rem;
  }
  .brand .amp { color: var(--rust); margin: 0 0.3em; font-weight: 400; }

  .stamp {
    position: fixed;
    font-family: 'Oswald', sans-serif;
    font-weight: 700;
    color: var(--olive);
    border: 3px solid var(--olive);
    padding: 0.5rem 1.2rem;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    font-size: 0.8rem;
    opacity: 0.8;
    top: 16%; left: 7%;
    transform: rotate(-6deg);
    z-index: 6;
  }

  @media (max-aspect-ratio: 1/1) {
    .stage { padding: 10rem 3rem; }
    .headline { font-size: clamp(2.5rem, 10vw, 6rem); }
    .cta { min-width: 100%; }
  }
</style>
</head>
<body>

  <div class="border-outer"></div>
  <div class="border-inner"></div>

  <div class="manual-header">
    <div>Addison Foxhole <span class="dot-sep"></span> Technical Manual</div>
    <div>End of Lesson</div>
  </div>

  <div class="stamp">Dismissed</div>

  <div class="stage">
    <div class="eyebrow">End of Manual</div>
    <h1 class="headline">Keep Your Tools Sharp</h1>
    <div class="rule"></div>
    <p class="body-copy">
      Questions about your own rig? <br>
      Bring them to the Foxhole Discord — <br>
      coached live, no bad questions.
    </p>

    <div class="cta-row">
      <div class="cta">
        <div class="action">Next Manual</div>
        <div class="target">Subscribe</div>
      </div>
      <div class="cta">
        <div class="action">Join the Coaching</div>
        <div class="target">Foxhole Discord</div>
      </div>
    </div>
  </div>

  <div class="footer">
    <div class="brand">Addison <span class="amp">/</span> Foxhole</div>
    <div>Auto Care <span class="dot-sep"></span> Coached Right</div>
    <div id="date">—</div>
  </div>

<script>
  const n = new Date();
  const months = ['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'];
  document.getElementById('date').textContent =
    `${String(n.getDate()).padStart(2,'0')} ${months[n.getMonth()]} ${n.getFullYear()}`;
</script>

</body>
</html>
