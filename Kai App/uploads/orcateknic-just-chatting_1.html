<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>OrcaTeknic — Just Chatting</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@200;300;400;500&display=swap" rel="stylesheet">

<!-- CUSTOMIZE THE TOPIC HERE: -->
<script>const TOPIC = "DEEP FIELD RECORDING";</script>

<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --abyss: #020509;
    --deep: #050e16;
    --bio: #4dd4c0;
    --text: #e8eef2;
    --dim: #5a6a75;
    --faint: #2a3740;
  }
  html, body {
    width: 100vw; height: 100vh;
    background: var(--abyss);
    color: var(--text);
    font-family: 'IBM Plex Mono', monospace;
    font-weight: 300;
    overflow: hidden;
    user-select: none;
  }
  body {
    background:
      radial-gradient(ellipse at 30% 50%, var(--deep) 0%, var(--abyss) 70%),
      var(--abyss);
  }

  /* Noise */
  body::before {
    content: ''; position: fixed; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 400 400' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    opacity: 0.05; pointer-events: none; z-index: 100; mix-blend-mode: overlay;
  }

  /* Frame */
  .frame {
    position: fixed; inset: 2rem;
    border: 1px solid var(--faint);
    pointer-events: none;
  }

  /* Layout: horizontal = cam left, panel right. Vertical = cam top, panel bottom. */
  .grid {
    position: absolute; inset: 4rem;
    display: grid;
    grid-template-columns: 1.6fr 1fr;
    gap: 3rem;
    align-items: stretch;
  }

  /* Webcam slot — you position your webcam source over this in OBS */
  .cam-slot {
    border: 1px solid var(--faint);
    position: relative;
    background:
      linear-gradient(135deg, rgba(77,212,192,0.03) 0%, transparent 50%),
      var(--deep);
  }
  .cam-slot::before {
    content: 'WEBCAM';
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    font-size: 0.75rem;
    letter-spacing: 0.5em;
    color: var(--faint);
    text-transform: uppercase;
  }
  .cam-slot .corner {
    position: absolute;
    width: 20px; height: 20px;
    border: 1.5px solid var(--bio);
  }
  .cam-slot .corner.tl { top: -1px; left: -1px; border-right: none; border-bottom: none; }
  .cam-slot .corner.br { bottom: -1px; right: -1px; border-left: none; border-top: none; }

  /* Info panel */
  .panel {
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    padding: 1rem 0;
  }

  .panel h2 {
    font-size: 0.75rem;
    letter-spacing: 0.5em;
    color: var(--dim);
    font-weight: 400;
    margin-bottom: 1rem;
    text-transform: uppercase;
  }

  .panel .topic {
    font-size: clamp(1.5rem, 2.5vw, 3rem);
    font-weight: 200;
    letter-spacing: -0.02em;
    line-height: 1.05;
    color: var(--text);
    margin-bottom: 2.5rem;
  }

  .meta-row {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    padding: 0.9rem 0;
    border-bottom: 1px solid var(--faint);
    font-size: 0.85rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
  }
  .meta-row .k { color: var(--dim); font-size: 0.7rem; letter-spacing: 0.3em; }
  .meta-row .v { color: var(--text); font-variant-numeric: tabular-nums; }

  /* Waveform */
  .wave {
    display: flex; gap: 3px; align-items: center;
    height: 28px; margin-top: 2rem;
  }
  .wave span {
    width: 2px; background: var(--bio); opacity: 0.7;
    animation: wave 1.4s ease-in-out infinite;
  }
  .wave span:nth-child(1) { height: 30%; animation-delay: 0.0s; }
  .wave span:nth-child(2) { height: 60%; animation-delay: 0.1s; }
  .wave span:nth-child(3) { height: 100%; animation-delay: 0.2s; }
  .wave span:nth-child(4) { height: 75%; animation-delay: 0.3s; }
  .wave span:nth-child(5) { height: 50%; animation-delay: 0.4s; }
  .wave span:nth-child(6) { height: 85%; animation-delay: 0.3s; }
  .wave span:nth-child(7) { height: 40%; animation-delay: 0.2s; }
  .wave span:nth-child(8) { height: 65%; animation-delay: 0.1s; }

  /* Bars (top & bottom) */
  .telemetry-top, .telemetry-bottom {
    position: fixed; left: 3.5rem; right: 3.5rem;
    display: flex; justify-content: space-between;
    font-size: 0.75rem; letter-spacing: 0.2em;
    color: var(--dim); text-transform: uppercase;
    z-index: 10;
  }
  .telemetry-top { top: 3rem; }
  .telemetry-bottom { bottom: 3rem; }
  .active-dot {
    display: inline-block; width: 6px; height: 6px;
    border-radius: 50%; background: var(--bio);
    box-shadow: 0 0 8px var(--bio);
    animation: pulse 2s infinite; margin-right: 0.7rem;
    vertical-align: middle;
  }
  .wordmark { font-weight: 500; color: var(--text); letter-spacing: 0.35em; }
  .wordmark .mark { color: var(--bio); font-weight: 300; margin: 0 0.1em; }

  /* Vertical layout */
  @media (max-aspect-ratio: 1/1) {
    .grid {
      grid-template-columns: 1fr;
      grid-template-rows: 2fr 1fr;
    }
    .panel .topic { font-size: clamp(1.3rem, 4vw, 2.5rem); }
  }

  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.35} }
  @keyframes wave { 0%,100%{transform:scaleY(0.4)} 50%{transform:scaleY(1)} }
</style>
</head>
<body>

  <div class="frame"></div>

  <div class="telemetry-top">
    <div><span class="active-dot"></span>LIVE / HYDROPHONE</div>
    <div id="sessiontime">SESSION — 00:00</div>
  </div>

  <div class="grid">
    <div class="cam-slot">
      <div class="corner tl"></div>
      <div class="corner br"></div>
    </div>

    <div class="panel">
      <div>
        <h2>Now Transmitting</h2>
        <div class="topic" id="topic">—</div>

        <div class="meta-row">
          <span class="k">Channel</span>
          <span class="v">01 / Voice</span>
        </div>
        <div class="meta-row">
          <span class="k">Location</span>
          <span class="v">19.8968°N</span>
        </div>
        <div class="meta-row">
          <span class="k">Signal</span>
          <span class="v">Stable</span>
        </div>

        <div class="wave">
          <span></span><span></span><span></span><span></span>
          <span></span><span></span><span></span><span></span>
        </div>
      </div>

      <div style="font-size: 0.7rem; letter-spacing: 0.25em; color: var(--dim); text-transform: uppercase;">
        YouTube · TikTok · Instagram<br>
        <span style="color: var(--text); margin-top: 0.5rem; display: inline-block;">@orcateknic</span>
      </div>
    </div>
  </div>

  <div class="telemetry-bottom">
    <div class="wordmark">Orca<span class="mark">/</span>Teknic</div>
    <div>BROADCAST / READY</div>
  </div>

<script>
  document.getElementById('topic').textContent = TOPIC;

  const start = Date.now();
  function tick() {
    const elapsed = Math.floor((Date.now() - start) / 1000);
    const h = Math.floor(elapsed / 3600);
    const m = Math.floor((elapsed % 3600) / 60);
    const s = elapsed % 60;
    const p = x => String(x).padStart(2, '0');
    document.getElementById('sessiontime').textContent =
      `SESSION — ${p(h)}:${p(m)}:${p(s)}`;
  }
  tick();
  setInterval(tick, 1000);
</script>

</body>
</html>
